name: Build Bubuntu Monster A1

on:
  workflow_dispatch:
    inputs:
      overclock:
        description: 'EXTREME Overclock 1.4GHz CPU + 750MHz GPU'
        required: true
        default: true
        type: boolean
      hostname:
        description: 'Hostname'
        required: true
        default: 'bubuntu'
        type: string
      username:
        description: 'Username'
        required: true
        default: 'dev'
        type: string
      password:
        description: 'User password'
        required: true
        default: 'bubuntu'
        type: string

env:
  PIGEN_REF: master
  IMG_NAME: Bubuntu-Monster-A1
  RELEASE: bookworm
  TIMEZONE: Europe/Berlin
  LOCALE: de_DE.UTF-8

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU for ARM emulation
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install pi-gen build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            coreutils quilt parted qemu-user-static debootstrap \
            zerofree zip dosfstools libarchive-tools libcap2-bin \
            grep rsync xz-utils file git curl bc gpg pigz xxd \
            arch-test kmod ca-certificates binfmt-support bmap-tools

      - name: Clone pi-gen repository
        run: |
          git clone --depth 1 --branch ${{ env.PIGEN_REF }} https://github.com/RPi-Distro/pi-gen.git

      - name: Generate pi-gen config
        working-directory: pi-gen
        run: |
          cat > config << EOF
          IMG_NAME=${IMG_NAME}
          RELEASE=${RELEASE}
          DEPLOY_COMPRESSION=xz
          TARGET_HOSTNAME=${{ inputs.hostname }}
          FIRST_USER_NAME=${{ inputs.username }}
          FIRST_USER_PASS=${{ inputs.password }}
          ENABLE_SSH=1
          LOCALE_DEFAULT=${LOCALE}
          KEYBOARD_KEYMAP=de
          KEYBOARD_LAYOUT=de
          TIMEZONE_DEFAULT=${TIMEZONE}
          STAGE_LIST="stage0 stage1 stage2"
          EOF
          touch./stage3/SKIP./stage4/SKIP./stage5/SKIP

      - name: Create Bubuntu custom stages
        working-directory: pi-gen
        run: |
          mkdir -p stage2/04-bubuntu-apps/files stage2/05-bubuntu-perf/files

          # --- Stage 04: Apps & Desktop ---
          cat > stage2/04-bubuntu-apps/00-packages << 'EOF'
          micro
          git
          chromium-browser
          privoxy
          fonts-noto-color-emoji
          neofetch
          htop
          ncdu
          xfce4
          xfce4-terminal
          xfce4-whiskermenu-plugin
          lightdm
          lightdm-gtk-greeter
          xserver-xorg
          xinit
          policykit-1
          gvfs
          dbus-x11
          EOF

          cat > stage2/04-bubuntu-apps/01-run.sh << 'EOF'
          #!/bin/bash -e
          install -m 755 files/chromium-bubuntu "${ROOTFS_DIR}/usr/local/bin/chromium-bubuntu"

          on_chroot << CHROOT
          cat > /etc/privoxy/config << 'PRIVOXY'
          listen-address 127.0.0.1:8118
          filterfile default.filter
          actionsfile default.action
          toggle 1
          enable-remote-toggle 0
          enable-edit-actions 0
          buffer-limit 4096
          PRIVOXY

          systemctl enable lightdm privoxy
          update-alternatives --set x-terminal-emulator /usr/bin/xfce4-terminal
          CHROOT
          EOF

          cat > stage2/04-bubuntu-apps/files/chromium-bubuntu << 'EOF'
          #!/bin/bash
          chromium-browser \
          --proxy-server="http://127.0.0.1:8118" \
          --max-old-space-size=128 \
          --js-flags="--max-old-space-size=128" \
          --single-process \
          --disable-gpu \
          --disable-software-rasterizer \
          --disable-dev-shm-usage \
          --no-sandbox \
          --disable-extensions \
          --disable-background-networking \
          --disable-sync \
          --disk-cache-dir=/tmp \
          --disk-cache-size=10000000 \
          --renderer-process-limit=1 \
          --memory-pressure-off \
          --user-data-dir=/tmp/chromium \
          "${1:-https://lite.duckduckgo.com}"
          EOF
          chmod +x stage2/04-bubuntu-apps/01-run.sh

          # --- Stage 05: Performance + Monster Mode ---
          cat > stage2/05-bubuntu-perf/00-run.sh << 'EOF'
          #!/bin/bash -e
          install -m 644 files/config.txt "${ROOTFS_DIR}/boot/firmware/config.txt"
          install -m 755 files/fps-boost "${ROOTFS_DIR}/usr/local/bin/fps-boost"
          install -m 755 files/fps-normal "${ROOTFS_DIR}/usr/local/bin/fps-normal"
          install -m 755 files/ram "${ROOTFS_DIR}/usr/local/bin/ram"
          install -m 755 files/cpu "${ROOTFS_DIR}/usr/local/bin/cpu"
          install -m 755 files/zram-start "${ROOTFS_DIR}/usr/local/bin/zram-start"
          install -m 644 files/zram.service "${ROOTFS_DIR}/etc/systemd/system/zram.service"

          on_chroot << CHROOT
          systemctl enable zram.service
          sed -i 's/CONF_SWAPSIZE=100/CONF_SWAPSIZE=2048/' /etc/dphys-swapfile

          # Kill bloat services for RAM
          systemctl disable bluetooth cups avahi-daemon ModemManager apt-daily.timer apt-daily-upgrade.timer man-db.timer triggerhappy rsyslog cron wpa_supplicant
          systemctl mask systemd-journald systemd-logind

          # Auto-Resize Service
          apt-get install -y parted
          cat > /usr/lib/raspi-config/init_resize.sh << 'RESIZE'
          #!/bin/sh
          if [! -e /boot/firmware/.resized ]; then
            touch /boot/firmware/.resized
            root_part=$(findmnt / -o source -n)
            root_dev=$(echo "$root_part" | sed 's/p\?[0-9]*$//')
            part_num=$(echo "$root_part" | grep -o '[0-9]*$')
            echo ", +" | sfdisk -N $part_num --force $root_dev
            partprobe
            resize2fs $root_part
            sync
            reboot
          fi
          RESIZE
          chmod +x /usr/lib/raspi-config/init_resize.sh

          cat > /etc/systemd/system/resize2fs_once.service << 'SERVICE'
          [Unit]
          Description=Resize root filesystem
          DefaultDependencies=no
          After=local-fs.target
          [Service]
          Type=oneshot
          ExecStart=/usr/lib/raspi-config/init_resize.sh
          RemainAfterExit=yes
          [Install]
          WantedBy=sysinit.target
          SERVICE
          systemctl enable resize2fs_once.service
          CHROOT

          # Sysctl tuning for A1 SD
          cat >> ${ROOTFS_DIR}/etc/sysctl.conf << 'SYSCTL'
          vm.swappiness=150
          vm.vfs_cache_pressure=40
          vm.overcommit_memory=1
          vm.overcommit_ratio=100
          vm.dirty_background_ratio=1
          vm.dirty_ratio=3
          vm.page-cluster=0
          vm.min_free_kbytes=32768
          kernel.sched_autogroup_enabled=0
          kernel.nmi_watchdog=0
          SYSCTL

          # tmpfs for SD longevity
          cat >> ${ROOTFS_DIR}/etc/fstab << 'FSTAB'
          tmpfs /tmp tmpfs defaults,noatime,nosuid,size=800m 0 0
          tmpfs /var/log tmpfs defaults,noatime,nosuid,size=100m 0 0
          tmpfs /var/tmp tmpfs defaults,noatime,nosuid,size=200m 0 0
          tmpfs /var/cache/apt tmpfs defaults,noatime,nosuid,size=300m 0 0
          FSTAB
          EOF

          # Config.txt basierend auf Input
          if [[ "${{ inputs.overclock }}" == "true" ]]; then
            cat > stage2/05-bubuntu-perf/files/config.txt << 'EOF'

          # MONSTER MODE A1 - KUEHLUNG PFLICHT
          gpu_mem=32
          arm_freq=1400
          over_voltage=8
          core_freq=550
          force_turbo=1
          temp_limit=90
          disable_splash=1
          boot_delay=0
          dtoverlay=vc4-kms-v3d,cma-256
          initial_turbo=60
          avoid_warnings=2
          gpu_freq=750
          v3d_freq=750
          h264_freq=750
          isp_freq=750
          sdram_freq=550
          sdram_over_voltage=3
          EOF
          else
            cat > stage2/05-bubuntu-perf/files/config.txt << 'EOF'

          # SAFE MODE - Standard Clocks
          gpu_mem=32
          disable_splash=1
          boot_delay=0
          dtoverlay=vc4-kms-v3d,cma-128
          EOF
          fi

          # Helper Scripts
          cat > stage2/05-bubuntu-perf/files/fps-boost << 'EOF'
          #!/bin/bash
          echo "EXTREME FPS MODE - 1400MHz / 750MHz GPU"
          sudo killall lightdm xfdesktop xfwm4 2>/dev/null
          echo performance | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor >/dev/null
          echo 750000000 | sudo tee /sys/class/devfreq/3c000000.gpu/max_freq >/dev/null
          echo 750000000 | sudo tee /sys/class/devfreq/3c000000.gpu/min_freq >/dev/null
          sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches'
          xfwm4 --replace --vblank=off --compositor=off &
          echo "CPU: $(vcgencmd measure_clock arm | cut -d= -f2 | awk '{print $1/1000000}')MHz"
          echo "Temp: $(vcgencmd measure_temp)"
          EOF

          cat > stage2/05-bubuntu-perf/files/fps-normal << 'EOF'
          #!/bin/bash
          echo "NORMAL MODE"
          echo ondemand | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor >/dev/null
          xfwm4 --replace &
          EOF

          cat > stage2/05-bubuntu-perf/files/ram << 'EOF'
          #!/bin/bash
          free -h
          echo "--- ZRAM ---"
          swapon --show
          echo "--- TEMP ---"
          vcgencmd measure_temp
          EOF

          cat > stage2/05-bubuntu-perf/files/cpu << 'EOF'
          #!/bin/bash
          vcgencmd measure_clock arm
          vcgencmd measure_temp
          vcgencmd get_throttled
          EOF

          cat > stage2/05-bubuntu-perf/files/zram-start << 'EOF'
          #!/bin/bash
          modprobe zram num_devices=6
          for i in {0..5}; do
              echo lz4 > /sys/block/zram$i/comp_algorithm
              echo 256M > /sys/block/zram$i/disksize
              mkswap /dev/zram$i
              swapon -p 100 /dev/zram$i
          done
          EOF

          cat > stage2/05-bubuntu-perf/files/zram.service << 'EOF'
          [Unit]
          Description=ZRAM 6x 256MB - A1 optimiert
          After=local-fs.target
          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/zram-start
          RemainAfterExit=yes
          [Install]
          WantedBy=sysinit.target
          EOF

          chmod +x stage2/05-bubuntu-perf/00-run.sh

      - name: Build Bubuntu Image
        working-directory: pi-gen
        run: |
          sudo./build-docker.sh

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMG_NAME }}-${{ inputs.overclock && 'OC' || 'SAFE' }}
          path: pi-gen/deploy/*.img.xz
          retention-days: 7
          if-no-files-found: error
