name: Build Bubuntu No-Pigen A1

on:
  workflow_dispatch:
    inputs:
      overclock:
        description: 'EXTREME Overclock 1.4GHz CPU + 750MHz GPU'
        required: true
        default: true
        type: boolean
      hostname:
        description: 'Hostname'
        required: true
        default: 'bubuntu'
        type: string
      username:
        description: 'Username'
        required: true
        default: 'dev'
        type: string
      password:
        description: 'User password'
        required: true
        default: 'bubuntu'
        type: string

env:
  IMG_NAME: Bubuntu-NoPigen-A1
  IMG_SIZE: 4G

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y debootstrap qemu-user-static kpartx parted dosfstools xz-utils arch-test

      - name: Create base image
        run: |
          sudo dd if=/dev/zero of=${IMG_NAME}.img bs=1M count=4096
          sudo parted ${IMG_NAME}.img --script mklabel msdos
          sudo parted ${IMG_NAME}.img --script mkpart primary fat32 1MiB 256MiB
          sudo parted ${IMG_NAME}.img --script mkpart primary ext4 256MiB 100%
          sudo parted ${IMG_NAME}.img --script set 1 boot on

          LOOP=$(sudo kpartx -av ${IMG_NAME}.img | awk 'NR==1{print $3}' | sed 's/p1//')
          sudo mkfs.vfat /dev/mapper/${LOOP}p1
          sudo mkfs.ext4 /dev/mapper/${LOOP}p2

          mkdir -p rootfs boot
          sudo mount /dev/mapper/${LOOP}p2 rootfs
          sudo mkdir -p rootfs/boot/firmware
          sudo mount /dev/mapper/${LOOP}p1 rootfs/boot/firmware

          sudo qemu-debootstrap --arch=arm64 bookworm rootfs http://deb.debian.org/debian

          echo "${{ inputs.hostname }}" | sudo tee rootfs/etc/hostname
          
          sudo chroot rootfs /bin/bash -c "
            apt-get update
            apt-get install -y --no-install-recommends \
              linux-image-arm64 systemd-sysv \
              raspberrypi-bootloader raspberrypi-kernel \
              xfce4 xfce4-terminal lightdm chromium-browser \
              privoxy micro git htop neofetch \
              dbus-x11 policykit-1 gvfs
            useradd -m -s /bin/bash ${{ inputs.username }}
            echo '${{ inputs.username }}:${{ inputs.password }}' | chpasswd
            usermod -aG sudo ${{ inputs.username }}
            systemctl enable lightdm privoxy
            systemctl disable bluetooth cups avahi-daemon ModemManager
          "

          if [[ "${{ inputs.overclock }}" == "true" ]]; then
            sudo tee rootfs/boot/firmware/config.txt << 'EOF'
          gpu_mem=32
          arm_freq=1400
          over_voltage=8
          core_freq=550
          force_turbo=1
          temp_limit=90
          disable_splash=1
          dtoverlay=vc4-kms-v3d,cma-256
          gpu_freq=750
          v3d_freq=750
          sdram_freq=550
          EOF
          else
            sudo tee rootfs/boot/firmware/config.txt << 'EOF'
          gpu_mem=32
          disable_splash=1
          dtoverlay=vc4-kms-v3d,cma-128
          EOF
          fi

          echo "root=/dev/mmcblk0p2 rootfstype=ext4 fsck.repair=yes rootwait" | sudo tee rootfs/boot/firmware/cmdline.txt

          sudo umount rootfs/boot/firmware
          sudo umount rootfs
          sudo kpartx -d ${IMG_NAME}.img
          xz -T0 ${IMG_NAME}.img

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMG_NAME }}-${{ inputs.overclock && 'OC' || 'SAFE' }}
          path: ${{ env.IMG_NAME }}.img.xz
          retention-days: 7
